[general]
import = ["~/.config/alacritty/base.toml"]

[terminal.shell]
program = "tmux"
args    = ["new-session", "-As", "0"]

[font]
size = 9.0

[window]
decorations = "full"

[[hints.enabled]]
command         = "xdg-open"
hyperlinks      = true
post_processing = true
persist         = false
regex = "(ipfs:|ipns:|magnet:|mailto:|gemini:|gopher:|https:|http:|news:|file:|git:|ssh:|ftp:)[^\u0000-\u001F\u007F-\u009F<>\"\\s{-}\\^⟨⟩`]+"

[hints.enabled.binding]
key  = "U"
mods = "Control|Shift"

[hints.enabled.mouse]
enabled = true
mods    = "None"
