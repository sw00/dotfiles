# NOTE: This file is the source of truth but Alacritty runs on Windows.
# os/wsl/up.sh copies both base.toml and this file to %APPDATA%\Alacritty\.
# The import path below is resolved by Alacritty on Windows.
#
# This is the canonical WSL alacritty config (platform layer). Host-specific
# overrides (e.g. font size per display) go in hosts/<host>/alacritty/ and
# win over this file in up.sh's resolution order.
[general]
import = ["base.toml"]

[terminal.shell]
program = "wsl.exe"
# Run tmux directly so wsl.exe allocates a PTY for the process.
# bash --login -c would work for PATH but wsl.exe does not attach a PTY
# when invoked with --, causing tmux to fail with "not a terminal".
# The tmux.conf set-environment block handles PATH instead.
args    = ["~", "tmux", "new-session", "-As", "0"]

[font]
size = 12.0

[window]
decorations = "full"
# padding inherited from base.toml

[[hints.enabled]]
command         = { program = "cmd.exe", args = ["/c", "start", ""] }
hyperlinks      = true
post_processing = true
persist         = false
regex = "(ipfs:|ipns:|magnet:|mailto:|gemini:|gopher:|https:|http:|news:|file:|git:|ssh:|ftp:)[^\u0000-\u001F\u007F-\u009F<>\"\\s{-}\\^⟨⟩`]+"

[hints.enabled.binding]
key  = "U"
mods = "Control|Shift"

[hints.enabled.mouse]
enabled = true
mods    = "None"
