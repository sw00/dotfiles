name: check

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  check:
    name: dotfiles check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y stow shellcheck fish

      - name: Run check.sh
        run: bash check.sh
