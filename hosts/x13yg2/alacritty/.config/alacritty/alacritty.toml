# NOTE: This file is the source of truth but Alacritty runs on Windows.
# up.sh copies both base.toml and this file to %APPDATA%\Alacritty\.
# The import path below is resolved by Alacritty on Windows.
import = ["base.toml"]

[shell]
program = "wsl.exe"
args    = ["~", "tmux", "new-session", "-As", "0"]

[font]
size = 12.0

[window]
decorations = "full"

[window.padding]
x = 4
y = 4
