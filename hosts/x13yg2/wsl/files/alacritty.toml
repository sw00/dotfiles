[general]
live_config_reload = true

# Launch WSL directly into tmux
[shell]
program = "wsl.exe"
args = ["~", "tmux", "new-session", "-As", "0"]

[env]
TERM = "alacritty"

[font]
size = 12.0

[font.normal]
family = "CaskaydiaCove Nerd Font Mono"
style  = "Regular"

[colors.primary]
background    = "#2e3440"
foreground    = "#d8dee9"
dim_foreground = "#a5abb6"

[colors.cursor]
text   = "#2e3440"
cursor = "#d8dee9"

[colors.normal]
black   = "#3b4252"
red     = "#bf616a"
green   = "#a3be8c"
yellow  = "#ebcb8b"
blue    = "#81a1c1"
magenta = "#b48ead"
cyan    = "#88c0d0"
white   = "#e5e9f0"

[colors.bright]
black   = "#4c566a"
red     = "#bf616a"
green   = "#a3be8c"
yellow  = "#ebcb8b"
blue    = "#81a1c1"
magenta = "#b48ead"
cyan    = "#8fbcbb"
white   = "#eceff4"

[cursor.style]
shape    = "Block"
blinking = "Off"

[scrolling]
history    = 10000
multiplier = 3

[selection]
save_to_clipboard = true

[window]
dynamic_title = true
opacity       = 1.0

[window.dimensions]
columns = 120
lines   = 40

[window.padding]
x = 4
y = 4
