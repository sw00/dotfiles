# ~/.mise.toml — mbpm3 (work laptop) host-specific tools
# Loaded by mise from $HOME and all subdirectories on this machine only.
# Stowed by hosts/mbpm3/mise/ package; not present on other hosts.
#
# These are deployment/infra tools used in a work context.
# Everyday k8s navigation tools (kubectl, k9s, kubectx, kubens) are global
# and live in base/mise/.config/mise/config.toml.
#
# Several tools below use mise's pipx backend (isolated venvs per tool):
#   azure      → pipx:azure-cli   (registry shorthand)
#   pdm        → pipx:pdm         (registry shorthand)
#   aider-chat → pipx:aider-chat  (no registry shorthand; explicit)
# mise installs the pipx backend automatically when needed — no separate
# Homebrew installation required.

[tools]
helm       = "latest"
kubeseal   = "latest"
kustomize  = "latest"
argocd     = "latest"
opentofu   = "latest"
stern      = "latest"          # k8s log tailing (was: asdf)
k3d        = "latest"          # local k3s clusters (was: asdf)
awscli     = "latest"          # AWS CLI (was: asdf)
azure      = "latest"          # resolves to pipx:azure-cli
pdm        = "latest"          # resolves to pipx:pdm

# ── AI coding assistant ───────────────────────────────────────────────────────
# Managed via mise's pipx backend (isolated venv); was: standalone pipx install.
"pipx:aider-chat" = "latest"
