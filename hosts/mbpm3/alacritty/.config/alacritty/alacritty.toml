[general]
import = ["~/.config/alacritty/base.toml"]

[terminal.shell]
# Use bash --login so Homebrew is on PATH (GUI apps don't source shell profiles).
# bash then exec-replaces itself with fish which activates mise shims before
# handing off to tmux.  Works on both Apple Silicon and Intel Macs.
program = "/bin/bash"
args    = ["--login", "-c", "exec fish -c 'tmux new-session -As 0'"]

[font]
size = 12.0

[window]
decorations    = "full"
option_as_alt  = "OnlyLeft"  # left Option → Alt in terminal

# ── Keyboard bindings ────────────────────────────────────────────────────────
# option_as_alt above consumes left-Option before Alacritty's built-in
# ToggleSimpleFullscreen binding fires.  Re-declare it explicitly so
# Alt+Enter still maximises the window.
[[keyboard.bindings]]
key    = "Return"
mods   = "Alt"
action = "ToggleSimpleFullscreen"

[[hints.enabled]]
command         = "open"
hyperlinks      = true
post_processing = true
persist         = false
regex = "(ipfs:|ipns:|magnet:|mailto:|gemini:|gopher:|https:|http:|news:|file:|git:|ssh:|ftp:)[^\u0000-\u001F\u007F-\u009F<>\"\\s{-}\\^⟨⟩`]+"

[hints.enabled.binding]
key  = "U"
mods = "Control|Shift"

[hints.enabled.mouse]
enabled = true
mods    = "None"
