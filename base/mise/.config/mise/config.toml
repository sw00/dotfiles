# ~/.config/mise/config.toml
# CLI tools and language runtimes — all platforms (macOS, Linux, WSL2).
# This is the single source of truth for Level 2/3 tooling.
# OS package managers (brew/apt/winget) handle Level 1 only.
# Docs: https://mise.jdx.dev/configuration.html

# ── Core CLI tools ────────────────────────────────────────────────────────────
[tools]
neovim      = "latest"
fzf         = "latest"
fd          = "latest"
ripgrep     = "latest"
bat         = "latest"
delta       = "latest"
jq          = "latest"
yq          = "latest"
zoxide      = "latest"
direnv      = "latest"
shellcheck  = "latest"
pre-commit  = "latest"
lazygit     = "latest"

# ── Terminal / shell ──────────────────────────────────────────────────────────
# tmux replaces apt/brew tmux; uniform version across all platforms.
# tmux-fingers is handled by TPM (see tmux.conf); not needed here.
tmux              = "latest"
# sesh (smart session manager) has no mise registry entry; installed by
# ensure_sesh in bootstrap.sh from GitHub releases.

# ── Devops — everyday k8s navigation ─────────────────────────────────────────
kubectl  = "latest"
k9s      = "latest"
kubectx  = "latest"
kubens   = "latest"
lnav     = "latest"
# Deployment/infra tools are work-laptop specific:
# see hosts/mbpm3/mise/.mise.toml for helm, kubeseal, kustomize, argocd, opentofu

# ── Language runtimes ─────────────────────────────────────────────────────────
# Pin to a minor, let mise pick the patch. Update intentionally.
node    = "22"
python  = "3.12"
uv = "latest"

# Uncomment when needed on a project:
# go     = "latest"
# rust   = "latest"
# elixir = "latest"
# ruby   = "3.3"
# java   = "temurin-21"

# ── Settings ─────────────────────────────────────────────────────────────────
[settings]
# Python packages needed by tools (tmux plugins, scripts, etc.) — not projects.
# Installed automatically whenever mise provisions a new Python version.
# Add packages here rather than running pip manually or using venvs for tools.
python.default_packages_file = "~/.config/mise/default-python-packages"

# npm packages installed globally into the mise-managed Node for tool use.
# NOT for project dependencies — use a per-project package.json for those.
# Installed automatically whenever mise provisions a new Node version.
# Add packages here rather than running npm install -g manually.
node.default_packages_file   = "~/.config/mise/default-node-packages"
