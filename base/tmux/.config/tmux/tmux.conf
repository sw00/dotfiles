# -- General Settings ------------------------------------------
set -g default-terminal "screen-256color"    # Colors!
set -g history-limit 100000                  # Boost history
set -g buffer-limit 20                       # Increase buffer size
set -g display-time 1500                     # Increase message display time
set -g remain-on-exit off                    # Auto-exit when pane command exits
set -g mouse on                              # Enable mouse support
set -g base-index 1                          # Start window numbering at 1
setw -g pane-base-index 1                    # Start pane numbering at 1
setw -g aggressive-resize off                #
setw -g clock-mode-style 24                  #
set  -s escape-time 1                        #
set -g focus-events on                       # Pass focus events to apps inside tmux
set -g extended-keys on                      # Forward modified keys (Shift/Ctrl+Enter etc.)

# Extra overrides
set -ag terminal-overrides ',alacritty:RGB,gnome*:RGB,*:RGB'

# Inject user-local tool paths into the tmux server environment so that
# display-popup / run-shell commands find locally installed binaries (sesh,
# fzf via mise shims, etc.) regardless of which shell tmux spawns.
# This is necessary because Alacritty launches tmux directly via wsl.exe
# without a login shell, so ~/.profile and mise activation never run and
# the server inherits only the bare WSL system PATH.
run-shell 'tmux set-environment -g PATH "$HOME/.local/share/mise/shims:$HOME/.local/bin:$HOME/bin:$PATH"'

# Set Fish as default shell if available.
# run-shell is used because if-shell evaluates conditions in /bin/sh where
# `type -q` is Fish-only syntax, and tmux does not expand (which fish) as a
# command substitution inside a tmux command string.
run-shell 'tmux set -g default-shell "$(command -v fish || echo "$SHELL")"'

# -- Status bar ------------------------------------------------
set -g status-position top
set -g status-justify left
set -g status-bg black
set -g status-fg brightwhite

set -g window-status-format "#[fg=brightwhite] #I:#W "
set -g window-status-current-format "#[bg=green,fg=white] #I:#W "
set -g window-status-style "bg=black"
set -g window-status-last-style "bg=black,fg=green"

set -g status-left-length 32
set -g status-right-length 120

set -g status-right "#(~/bin/wifi_status) | #(~/bin/ip_addresses) | %b %d %R "
set -g status-interval 20

# -- Key Bindings ----------------------------------------------

# vim-tmux-navigator: C-hjkl are NOT intercepted at the tmux level.
# Neovim handles split navigation via its own plugin; the shell receives these
# keys natively (C-h = backspace, C-j = newline, C-k = kill line, C-l = clear).
# Use M-arrows (below) or C-a hjkl for tmux pane navigation outside nvim.
#
# C-\ is still bound: jump to last pane when outside nvim.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind -n 'C-\' if-shell "$is_vim" 'send-keys C-\' 'select-pane -l'

# Change prefix key to C-a
unbind C-b
set -g prefix C-a
bind C-a send-prefix
bind -N "Send the prefix key through to the application" \
  a send-prefix
bind C-a last-window # quick switch

# use Vim key-bindings
set -g status-keys vi
set -g mode-keys   vi

# Reload tmux config
bind R source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded!"

# Split panes using | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Vim-like pane navigation/resizing
bind -N "Select left pane to the left of the active pane" h select-pane -L
bind -N "Select pane below the active pane" j select-pane -D
bind -N "Select pane above the active pane" k select-pane -U
bind -N "Select pane to the right of the active pane" l select-pane -R

bind -r -N "Resize the pane left by 10" \
  H resize-pane -L 10
bind -r -N "Resize the pane down by 10" \
  J resize-pane -D 10
bind -r -N "Resize the pane up by 10" \
  K resize-pane -U 10
bind -r -N "Resize the pane right by 10" \
  L resize-pane -R 10

# Clipboard yanking
bind-key -T copy-mode-vi v send -X begin-selection

# Platform-conditional clipboard: pbcopy on macOS, clip.exe fallback on WSL/Linux
if-shell "uname | grep -q Darwin" {
    bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
    bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
} {
    bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard 2>/dev/null || clip.exe"
    bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard 2>/dev/null || clip.exe"
}

# Sesh — smart tmux session manager (joshmedeski/sesh)
# C-f: combined repo finder + session switcher
# Repos from zoxide (filtered to ~/src/), plus active tmux sessions.
bind-key C-f display-popup -E -w 55% -h 40% \
    "sesh connect \"\$({ zoxide query -l --base-dir ~/src | grep -v '/\.git\$'; sesh list -t; } | awk '!seen[\$0]++' | fzf --prompt '⚡  ' --border-label ' sesh ' --no-preview --reverse)\""
# C-o: session-only switcher (active tmux sessions)
bind-key C-o display-popup -E -w 55% -h 40% \
    "sesh connect \"\$(sesh list -t | fzf --prompt '🔀  ' --border-label ' sessions ' --no-preview --reverse)\""
# C-j: jump to last session
bind-key C-j run-shell "sesh last"
# C-x: kill a session (pick with fzf)
bind-key C-x display-popup -E -w 55% -h 40% \
    "tmux kill-session -t \"\$(sesh list -t | fzf --prompt '  ' --border-label ' kill ' --no-preview --reverse)\""

# Throwaway terminal
bind-key C-t display-popup -E "fish"

# -- Plugins --------------------------------------------------
# TPM is not used: its startup overhead (~8 s on WSL due to multiple
# `tmux list-keys` round-trips) outweighs the benefit of managing two
# stable plugins. Plugins are cloned by bootstrap.sh and sourced directly.
#
# Removed tmux-sensible: all settings are already in this file; its
#   key-binding checks call `tmux list-keys` which takes 6-10 s on WSL.
# Removed tmux-yank: y/MouseDragEnd1Pane bindings above cover macOS and WSL.
# Removed tmux-continuum: restore was off; resurrect handles manual save/restore.
# Removed tmux-fingers: `load-config` runs synchronously and costs ~3 s per start.
run '~/.config/tmux/plugins/tmux-resurrect/resurrect.tmux'
run '~/.config/tmux/plugins/tmux-window-name/tmux_window_name.tmux'

# -- Plugin Configuration -------------------------------------
set -g @resurrect-capture-pane-contents 'on'     # Restore pane contents
set -g @resurrect-strategy-nvim 'session'        # Resurrect nvim per session

# -- Host-local overrides (keep last) ------------------------
# Create ~/.config/tmux/tmux.local.conf for machine-specific settings
# (not tracked in dotfiles — font sizes, status bar tweaks, etc.).
if-shell 'test -f ~/.config/tmux/tmux.local.conf' \
    'source-file ~/.config/tmux/tmux.local.conf'
