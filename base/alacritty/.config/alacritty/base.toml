# base.toml — shared Alacritty config (Nord theme + common settings)
# Imported by per-host alacritty.toml; do not use directly as the main config.

[general]
live_config_reload = true

[env]
TERM = "alacritty"

# ── Nord colour scheme ────────────────────────────────────────────────────────
[colors]
draw_bold_text_with_bright_colors = true

[colors.primary]
background    = "#2e3440"
foreground    = "#d8dee9"
dim_foreground = "#a5abb6"

[colors.cursor]
text   = "#2e3440"
cursor = "#d8dee9"

[colors.vi_mode_cursor]
text   = "#2e3440"
cursor = "#d8dee9"

[colors.normal]
black   = "#3b4252"
red     = "#bf616a"
green   = "#a3be8c"
yellow  = "#ebcb8b"
blue    = "#81a1c1"
magenta = "#b48ead"
cyan    = "#88c0d0"
white   = "#e5e9f0"

[colors.bright]
black   = "#4c566a"
red     = "#bf616a"
green   = "#a3be8c"
yellow  = "#ebcb8b"
blue    = "#81a1c1"
magenta = "#b48ead"
cyan    = "#8fbcbb"
white   = "#eceff4"

[colors.dim]
black   = "#373e4d"
red     = "#94545d"
green   = "#809575"
yellow  = "#b29e75"
blue    = "#68809a"
magenta = "#8c738c"
cyan    = "#6d96a5"
white   = "#aeb3bb"

[colors.search.matches]
background = "#88c0d0"
foreground = "CellBackground"

[colors.selection]
background = "#4c566a"
text       = "CellForeground"

# ── Font ──────────────────────────────────────────────────────────────────────
[font]
builtin_box_drawing = true

[font.normal]
family = "CaskaydiaCove Nerd Font Mono"
style  = "Regular"

# ── Cursor ───────────────────────────────────────────────────────────────────
[cursor]
blink_interval   = 750
blink_timeout    = 5
thickness        = 0.1
unfocused_hollow = true

[cursor.style]
shape    = "Block"
blinking = "Off"

# ── Mouse ────────────────────────────────────────────────────────────────────
[mouse]
hide_when_typing = true

[[mouse.bindings]]
mouse  = "Middle"
mode   = "~Vi"
action = "PasteSelection"

# ── Scrolling ────────────────────────────────────────────────────────────────
[scrolling]
history    = 10000
multiplier = 3

# ── Selection ────────────────────────────────────────────────────────────────
[selection]
save_to_clipboard    = true
semantic_escape_chars = ",│`|:\"' ()[]{}<>\t"

# ── Window ───────────────────────────────────────────────────────────────────
[window]
dynamic_title = true
opacity       = 1.0

[window.dimensions]
columns = 120
lines   = 40

[window.padding]
x = 4
y = 4

# ── Keyboard bindings ────────────────────────────────────────────────────────
[[keyboard.bindings]]
key    = "C"
mods   = "Control|Shift"
action = "Copy"

[[keyboard.bindings]]
key    = "V"
mods   = "Control|Shift"
mode   = "~Vi"
action = "Paste"

[[keyboard.bindings]]
key    = "F"
mods   = "Control|Shift"
mode   = "~Search"
action = "SearchForward"

[[keyboard.bindings]]
key    = "Key0"
mods   = "Control"
action = "ResetFontSize"

[[keyboard.bindings]]
key    = "Equals"
mods   = "Control"
action = "IncreaseFontSize"

[[keyboard.bindings]]
key    = "Minus"
mods   = "Control"
action = "DecreaseFontSize"

[[keyboard.bindings]]
key    = "Return"
mods   = "Alt"
action = "ToggleFullscreen"
