# base.toml — shared Alacritty configuration, imported by every host config.
#
# Covers everything that is the same across macOS, Linux, and Windows/WSL:
# font family, colors, window chrome, cursor, scrollback, hints, and bindings.
#
# Per-host configs override only what genuinely differs:
#   font.size          — DPI / monitor varies per machine
#   terminal.shell     — fish on macOS/Linux, wsl.exe on Windows
#   window.decorations — full on macOS/Windows, none under a tiling WM
#   window.option_as_alt — macOS only

# ── Font ─────────────────────────────────────────────────────────────────────
[font]
# CaskaydiaCove Nerd Font Mono installed by bootstrap.sh / up.sh on all platforms.
normal      = { family = "CaskaydiaCove Nerd Font Mono", style = "Regular"     }
bold        = { family = "CaskaydiaCove Nerd Font Mono", style = "Bold"        }
italic      = { family = "CaskaydiaCove Nerd Font Mono", style = "Italic"      }
bold_italic = { family = "CaskaydiaCove Nerd Font Mono", style = "Bold Italic" }
# size is set per-host
builtin_box_drawing = true

# ── Window ───────────────────────────────────────────────────────────────────
[window]
padding        = { x = 8, y = 8 }
dynamic_padding = false
opacity        = 1.0
blur           = false
dynamic_title  = true
# decorations, option_as_alt set per-host

# ── Scrollback ───────────────────────────────────────────────────────────────
[scrolling]
history    = 10000
multiplier = 3

# ── Cursor ───────────────────────────────────────────────────────────────────
[cursor]
style            = { shape = "Block", blinking = "Off" }
vi_mode_style    = "None"   # inherits cursor.style in vi mode
unfocused_hollow = true
thickness        = 0.15

# ── Mouse ────────────────────────────────────────────────────────────────────
[mouse]
hide_when_typing = true

# ── Selection ────────────────────────────────────────────────────────────────
[selection]
save_to_clipboard    = false
semantic_escape_chars = ",│`|:\"' ()[]{}<>\t"

# ── Terminal ─────────────────────────────────────────────────────────────────
[terminal]
# Allow OSC 52 copy (e.g. tmux copy to system clipboard); never paste.
osc52 = "OnlyCopy"
# shell is set per-host under [terminal.shell]

# ── Bell ─────────────────────────────────────────────────────────────────────
[bell]
animation = "Linear"
duration  = 0          # 0 = visual bell disabled; set >0 to enable

# ── Colors — Alacritty built-in default (Tomorrow Night) ────────────────────
# These match what Alacritty renders with no color config at all, making this
# file the explicit source of truth without changing the appearance.
[colors]
draw_bold_text_with_bright_colors = false

[colors.primary]
background = "#1d1f21"
foreground = "#c5c8c6"

[colors.cursor]
text   = "CellBackground"
cursor = "CellForeground"

[colors.vi_mode_cursor]
text   = "CellBackground"
cursor = "CellForeground"

[colors.search.matches]
foreground = "#000000"
background = "#ffffff"

[colors.search.focused_match]
foreground = "#ffffff"
background = "#00ff00"

[colors.hints.start]
foreground = "#1d1f21"
background = "#e9ff5e"

[colors.hints.end]
foreground = "#e9ff5e"
background = "#1d1f21"

[colors.selection]
text       = "CellBackground"
background = "CellForeground"

[colors.normal]
black   = "#1d1f21"
red     = "#cc6666"
green   = "#b5bd68"
yellow  = "#e6c547"
blue    = "#81a2be"
magenta = "#b294bb"
cyan    = "#70c0ba"
white   = "#747880"

[colors.bright]
black   = "#969896"
red     = "#cc6666"
green   = "#b5bd68"
yellow  = "#f0c674"
blue    = "#81a2be"
magenta = "#b294bb"
cyan    = "#70c0ba"
white   = "#c5c8c6"

# ── URL hints ────────────────────────────────────────────────────────────────
# Defined per-platform/host because the open command differs:
#   macOS:        open
#   Linux/WSL:    xdg-open
#   Windows:      cmd.exe /c start
# Each platform config adds its own [[hints.enabled]] block.
