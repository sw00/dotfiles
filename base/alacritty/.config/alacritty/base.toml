# base.toml — shared Alacritty configuration, imported by every platform and
# host config.
#
# Covers everything that is the same across macOS, Linux, and Windows/WSL:
# font family, colors, window chrome, cursor, scrollback, hints, and bindings.
#
# Platform configs (os/<platform>/alacritty) override what the OS forces:
#   terminal.shell     — tmux on macOS/Linux, wsl.exe on Windows
#   hints open command — open / xdg-open / cmd.exe /c start
# Host configs (hosts/<host>/alacritty) override only per-machine differences:
#   font.size          — DPI / monitor varies per machine
#   window.decorations — full on macOS/Windows, none under a tiling WM
#   window.option_as_alt — macOS only

# ── Font ─────────────────────────────────────────────────────────────────────
[font]
# CaskaydiaCove Nerd Font Mono installed by bootstrap.sh / up.sh on all platforms.
normal      = { family = "CaskaydiaCove Nerd Font Mono", style = "Regular"     }
bold        = { family = "CaskaydiaCove Nerd Font Mono", style = "Bold"        }
italic      = { family = "CaskaydiaCove Nerd Font Mono", style = "Italic"      }
bold_italic = { family = "CaskaydiaCove Nerd Font Mono", style = "Bold Italic" }
# size is set per-host
builtin_box_drawing = true

# ── Window ───────────────────────────────────────────────────────────────────
[window]
padding        = { x = 8, y = 8 }
dynamic_padding = false
opacity        = 1.0
blur           = false
dynamic_title  = true
# decorations, option_as_alt set per-host

# ── Scrollback ───────────────────────────────────────────────────────────────
[scrolling]
history    = 10000
multiplier = 3

# ── Cursor ───────────────────────────────────────────────────────────────────
[cursor]
style            = { shape = "Block", blinking = "Off" }
vi_mode_style    = "None"   # inherits cursor.style in vi mode
unfocused_hollow = true
thickness        = 0.15

# ── Mouse ────────────────────────────────────────────────────────────────────
[mouse]
hide_when_typing = true

# ── Selection ────────────────────────────────────────────────────────────────
[selection]
save_to_clipboard    = false
semantic_escape_chars = ",│`|:\"' ()[]{}<>\t"

# ── Terminal ─────────────────────────────────────────────────────────────────
[terminal]
# Allow OSC 52 copy (e.g. tmux copy to system clipboard); never paste.
osc52 = "OnlyCopy"
# shell is set per-host under [terminal.shell]

# ── Bell ─────────────────────────────────────────────────────────────────────
[bell]
animation = "Linear"
duration  = 0          # 0 = visual bell disabled; set >0 to enable

# ── Colors ───────────────────────────────────────────────────────────────────
# Inherit Alacritty's built-in default theme. Re-enable a [colors] block here
# only when a value genuinely differs from the built-in defaults.

# ── URL hints ────────────────────────────────────────────────────────────────
# Defined per-platform/host because the open command differs:
#   macOS:        open
#   Linux/WSL:    xdg-open
#   Windows:      cmd.exe /c start
# Each platform config adds its own [[hints.enabled]] block.
